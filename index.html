<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的项目</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>我的项目展示</h1>
    <p>这里放一句介绍自己的话</p>
  </header><main id="projects"></main>
  <script>
  const projects = [
    {
      title: "项目名称",
      description: "一句话描述",
      thumbnail: "thumbnails/project1.png",
      link: "https://github.com/lijunyi771102-oss",
      tags: ["HTML", "CSS"]
    }
  ];

  const container = document.getElementById('projects');
  container.innerHTML = projects.map(p => `
    <a class="card" href="${p.link}" target="_blank">
      <img src="${p.thumbnail}" alt="${p.title}">
      <div class="info">
        <h2>${p.title}</h2>
        <p>${p.description}</p>
        <div class="tags">${p.tags.map(t => `<span>${t}</span>`).join('')}</div>
      </div>
    </a>
  `).join('');
</script>
</body>
</html>
